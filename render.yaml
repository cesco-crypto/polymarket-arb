services:
  - type: web
    name: polymarket-arb
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard.web_ui:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODE
        value: paper
      - key: LOG_LEVEL
        value: INFO
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
